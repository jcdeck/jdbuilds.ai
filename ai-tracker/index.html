<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Value Chain Investment Tracker</title>
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #242836;
  --border: #2d3348;
  --text: #e4e6ef;
  --text-dim: #8b8fa3;
  --accent: #6366f1;
  --green: #22c55e;
  --red: #ef4444;
  --yellow: #f59e0b;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
}
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.header h1 {
  font-size: 20px;
  font-weight: 700;
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.header .meta {
  font-size: 12px;
  color: var(--text-dim);
}
.tabs {
  display: flex;
  gap: 0;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  overflow-x: auto;
}
.tab {
  padding: 12px 20px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-dim);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  white-space: nowrap;
  transition: all 0.15s;
}
.tab:hover { color: var(--text); }
.tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}
.content { padding: 24px; max-width: 1400px; margin: 0 auto; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* Cards */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 16px;
}
.card h2 {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 12px;
}
.card h3 {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 8px;
}

/* Grid layouts */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.grid-auto { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }

/* Heatmap */
.heatmap-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 12px;
}
.heatmap-cell {
  padding: 16px;
  border-radius: 10px;
  text-align: center;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
}
.heatmap-cell:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}
.heatmap-cell .segment-name { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
.heatmap-cell .perf-value { font-size: 28px; font-weight: 700; }
.heatmap-cell .perf-label { font-size: 11px; opacity: 0.8; margin-top: 2px; }
.heatmap-cell .mcap { font-size: 11px; opacity: 0.7; margin-top: 8px; }

/* Tables */
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th {
  text-align: left;
  padding: 10px 12px;
  font-weight: 600;
  color: var(--text-dim);
  border-bottom: 1px solid var(--border);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
}
tr:hover td { background: var(--surface2); }
.positive { color: var(--green); }
.negative { color: var(--red); }
.neutral { color: var(--text-dim); }

/* Sparkline */
.sparkline { width: 80px; height: 30px; }

/* News */
.news-item {
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}
.news-item:last-child { border-bottom: none; }
.news-item a {
  color: var(--text);
  text-decoration: none;
  font-size: 13px;
  font-weight: 500;
  line-height: 1.4;
}
.news-item a:hover { color: var(--accent); }
.news-meta {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 3px;
}

/* Leader cards */
.leader-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
}
.leader-card .leader-name {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 2px;
}
.leader-card .leader-role {
  font-size: 12px;
  color: var(--text-dim);
  margin-bottom: 12px;
}

/* Capex flow */
.flow-container { position: relative; }
.flow-row {
  display: flex;
  align-items: center;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}
.flow-row:last-child { border-bottom: none; }
.flow-from {
  width: 180px;
  font-size: 13px;
  font-weight: 500;
  flex-shrink: 0;
}
.flow-bar-container {
  flex: 1;
  margin: 0 16px;
  position: relative;
}
.flow-bar {
  height: 28px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  padding: 0 10px;
  font-size: 12px;
  font-weight: 600;
  color: white;
  min-width: 60px;
}
.flow-to {
  width: 200px;
  font-size: 12px;
  color: var(--text-dim);
  flex-shrink: 0;
}
.flow-value {
  width: 80px;
  font-size: 14px;
  font-weight: 700;
  text-align: right;
  flex-shrink: 0;
}

/* Period selector */
.period-selector {
  display: flex;
  gap: 4px;
  background: var(--surface2);
  border-radius: 8px;
  padding: 3px;
  margin-bottom: 16px;
  width: fit-content;
}
.period-btn {
  padding: 6px 14px;
  font-size: 12px;
  font-weight: 500;
  border: none;
  background: none;
  color: var(--text-dim);
  cursor: pointer;
  border-radius: 6px;
  transition: all 0.15s;
}
.period-btn.active {
  background: var(--accent);
  color: white;
}

/* Capex table */
.capex-table td:nth-child(n+2),
.capex-table th:nth-child(n+2) { text-align: right; }

/* Segment badge */
.segment-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 500;
}

/* Comparison chart placeholder */
.chart-container {
  background: var(--surface2);
  border-radius: 8px;
  padding: 20px;
  min-height: 300px;
  position: relative;
}

/* Summary stats */
.stat-row {
  display: flex;
  gap: 16px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.stat-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px 20px;
  flex: 1;
  min-width: 160px;
}
.stat-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
.stat-value { font-size: 24px; font-weight: 700; margin-top: 4px; }
.stat-sub { font-size: 12px; color: var(--text-dim); margin-top: 2px; }

/* Loading */
.loading {
  text-align: center;
  padding: 60px;
  color: var(--text-dim);
}
.loading .spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 768px) {
  .grid-2, .grid-3 { grid-template-columns: 1fr; }
  .content { padding: 12px; }
  .flow-from { width: 120px; }
  .flow-to { display: none; }
}
</style>
</head>

<script>
// ============================================================
// Data Loading
// ============================================================
let DATA = null;

function loadData() {
  // Check if data was embedded as a JS variable by ai_tracker.py
  if (window.TRACKER_DATA) {
    DATA = window.TRACKER_DATA;
    init();
    return;
  }

  // Try API endpoint (when running via --serve)
  fetch('/api/data')
    .then(r => { if (!r.ok) throw new Error(); return r.json(); })
    .then(d => { DATA = d; init(); })
    .catch(() => {
      // Fallback: try external JSON file
      fetch('ai_tracker_data.json')
        .then(r => r.json())
        .then(d => { DATA = d; init(); })
        .catch(() => {
          document.getElementById('loading').innerHTML =
            '<p>No data found. Run <code>python3 ai_tracker.py --serve</code> to start the server.</p>';
        });
    });
}

function refreshData() {
  // Re-query DOM every time (in case page re-rendered)
  const btn = document.getElementById('refresh-btn');
  const icon = document.getElementById('refresh-icon');
  const text = document.getElementById('refresh-text');
  if (!btn || btn.disabled) return;
  btn.disabled = true;
  btn.style.opacity = '0.6';
  icon.style.animation = 'spin 0.8s linear infinite';
  text.textContent = 'Starting...';

  const oldTs = DATA?.generated_at;
  let seconds = 0;

  // Start the timer display immediately
  const timer = setInterval(() => {
    seconds += 1;
    text.textContent = `Refreshing... ${seconds}s`;
  }, 1000);

  // Trigger the refresh
  fetch('/api/refresh')
    .then(r => r.json())
    .then(() => {
      // Now poll for completion every 5s
      const poll = setInterval(() => {
        fetch('/api/status')
          .then(r => r.json())
          .then(s => {
            if (s.error) {
              clearInterval(poll);
              clearInterval(timer);
              text.textContent = 'Error!';
              icon.style.animation = '';
              btn.style.opacity = '1';
              setTimeout(() => { text.textContent = 'Refresh'; btn.disabled = false; }, 3000);
              return;
            }
            // When not running anymore, fetch the new data
            if (!s.running) {
              fetch('/api/data')
                .then(r => r.json())
                .then(d => {
                  if (d.generated_at !== oldTs) {
                    clearInterval(poll);
                    clearInterval(timer);
                    DATA = d;
                    init();
                    // Re-query DOM after init() re-renders
                    const b = document.getElementById('refresh-btn');
                    const t = document.getElementById('refresh-text');
                    const ic = document.getElementById('refresh-icon');
                    if (t) t.textContent = `Updated! (${seconds}s)`;
                    if (ic) ic.style.animation = '';
                    if (b) { b.style.opacity = '1'; setTimeout(() => { b.disabled = false; if (t) t.textContent = 'Refresh'; }, 3000); }
                  }
                  // If timestamp same, refresh might still be starting — keep polling
                });
            }
          })
          .catch(() => {});

        if (seconds > 600) {
          clearInterval(poll);
          clearInterval(timer);
          text.textContent = 'Timeout';
          icon.style.animation = '';
          btn.style.opacity = '1';
          setTimeout(() => { text.textContent = 'Refresh'; btn.disabled = false; }, 3000);
        }
      }, 5000);
    })
    .catch(() => {
      clearInterval(timer);
      text.textContent = 'Not in server mode';
      btn.style.opacity = '1';
      icon.style.animation = '';
      setTimeout(() => { text.textContent = 'Refresh'; btn.disabled = false; }, 3000);
    });
}

function init() {
  document.getElementById('loading').style.display = 'none';
  const ts = DATA.generated_at ? new Date(DATA.generated_at).toLocaleString() : 'Unknown';
  document.getElementById('last-updated').textContent = `Updated: ${ts}`;
  renderAll();
  setupTabs();
}

// ============================================================
// Tab Navigation
// ============================================================
function setupTabs() {
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      const panel = document.getElementById('panel-' + tab.dataset.tab);
      if (panel) panel.classList.add('active');
    });
  });
}

// ============================================================
// Helpers
// ============================================================
function fmt(val, suffix='%') {
  if (val == null || val === undefined) return '—';
  return (val >= 0 ? '+' : '') + val.toFixed(2) + suffix;
}
function perfClass(val) {
  if (val == null) return 'neutral';
  return val >= 0 ? 'positive' : 'negative';
}
function fmtMcap(val) {
  if (!val) return '—';
  if (val >= 1e12) return '$' + (val/1e12).toFixed(2) + 'T';
  if (val >= 1e9) return '$' + (val/1e9).toFixed(1) + 'B';
  return '$' + (val/1e6).toFixed(0) + 'M';
}
function perfColor(val) {
  if (val == null) return '#555';
  if (val > 10) return '#16a34a';
  if (val > 5) return '#22c55e';
  if (val > 2) return '#4ade80';
  if (val > 0) return '#86efac';
  if (val > -2) return '#fca5a5';
  if (val > -5) return '#f87171';
  if (val > -10) return '#ef4444';
  return '#dc2626';
}
function heatBg(val) {
  if (val == null) return 'var(--surface2)';
  const intensity = Math.min(Math.abs(val) / 15, 1);
  if (val >= 0) return `rgba(34, 197, 94, ${0.15 + intensity * 0.4})`;
  return `rgba(239, 68, 68, ${0.15 + intensity * 0.4})`;
}

function drawSparkline(canvas, data, color) {
  if (!data || data.length < 2) return;
  const ctx = canvas.getContext('2d');
  const w = canvas.width = canvas.offsetWidth * 2;
  const h = canvas.height = canvas.offsetHeight * 2;
  ctx.scale(2, 2);
  const cw = canvas.offsetWidth;
  const ch = canvas.offsetHeight;
  const min = Math.min(...data);
  const max = Math.max(...data);
  const range = max - min || 1;
  ctx.beginPath();
  ctx.strokeStyle = color || '#6366f1';
  ctx.lineWidth = 1.5;
  data.forEach((v, i) => {
    const x = (i / (data.length - 1)) * cw;
    const y = ch - ((v - min) / range) * (ch - 4) - 2;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();
}

function renderNews(items) {
  if (!items || items.length === 0) return '<div class="news-meta">No recent news</div>';
  return items.map(n => `
    <div class="news-item">
      <a href="${n.url}" target="_blank">${n.title}</a>
      <div class="news-meta">${n.source || ''} ${n.date ? '· ' + new Date(n.date).toLocaleDateString() : ''}</div>
    </div>
  `).join('');
}

// ============================================================
// Render All Panels
// ============================================================
function renderAll() {
  const container = document.getElementById('content');
  container.innerHTML = `
    <div id="panel-overview" class="tab-panel active"></div>
    <div id="panel-capex" class="tab-panel"></div>
    <div id="panel-semiconductors" class="tab-panel"></div>
    <div id="panel-hyperscalers" class="tab-panel"></div>

    <div id="panel-infrastructure" class="tab-panel"></div>
    <div id="panel-platforms" class="tab-panel"></div>
    <div id="panel-software" class="tab-panel"></div>
    <div id="panel-leaders" class="tab-panel"></div>
    <div id="panel-comparison" class="tab-panel"></div>
    <div id="panel-analysis" class="tab-panel"></div>
  `;

  renderOverview();
  renderCapex();
  renderSegmentDetail('semiconductors');
  renderSegmentDetail('hyperscalers');
  renderSegmentDetail('energy');
  renderSegmentDetail('infrastructure');
  renderSegmentDetail('platforms');
  renderSegmentDetail('software');
  renderLeaders();
  renderComparison();
  renderAnalysis();

  // Draw sparklines after DOM update
  requestAnimationFrame(() => {
    document.querySelectorAll('canvas.sparkline').forEach(c => {
      const ticker = c.dataset.ticker;
      const stock = DATA.stock_data[ticker];
      if (stock && stock.sparkline) {
        const lastVal = stock.sparkline[stock.sparkline.length-1];
        const firstVal = stock.sparkline[0];
        const color = lastVal >= firstVal ? '#22c55e' : '#ef4444';
        drawSparkline(c, stock.sparkline, color);
      }
    });
  });
}

// ============================================================
// Overview Tab
// ============================================================
function renderOverview() {
  const panel = document.getElementById('panel-overview');

  let html = `

      btn.classList.add('active');
      renderHeatmap(btn.dataset.p);
    });

}

function renderHeatmap(period) {
  const grid = document.getElementById('heatmap');
  const segments = Object.values(DATA.segments);

  grid.innerHTML = segments.map(s => {

}

function switchToTab(segId) {

function renderSegmentDetail(segId) {
  const panel = document.getElementById('panel-' + segId);
  const seg = DATA.segments[segId];
  if (!seg) { panel.innerHTML = '<div class="card">Segment not found.</div>'; return; }

  const perf = DATA.segment_performance[segId];
  const tickers = seg.tickers || [];
  const stocks = tickers.map(t => DATA.stock_data[t]).filter(Boolean);

  // Segment header
  let html = `
    <div class="stat-row">
      <div class="stat-box">
        <div class="stat-label">Segment</div>
        <div class="stat-value" style="font-size: 18px; color: ${seg.color}">${seg.name}</div>

        <div class="stat-label">Total Market Cap</div>

      <div class="stat-box">
        <div class="stat-label">Avg YTD</div>
        <div class="stat-value ${perfClass(perf?.avg_performance?.ytd)}">${fmt(perf?.avg_performance?.ytd)}</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Avg 1M</div>
        <div class="stat-value ${perfClass(perf?.avg_performance?.['1m'])}">${fmt(perf?.avg_performance?.['1m'])}</div>
      </div>
    </div>
  `;

  // Company table
  html += `
    <div class="card">
      <h2>Companies</h2>
      <table>
        <thead>
          <tr>
            <th>Ticker</th><th>Name</th><th>Price</th><th>Market Cap</th>
            <th>P/E</th><th>Fwd P/E</th>
            <th>1D</th><th>1W</th><th>1M</th><th>YTD</th><th>1Y</th>
            <th>Chart</th>
          </tr>
        </thead>
        <tbody>
          ${stocks.map(s => `
            <tr>
              <td><strong>${s.ticker}</strong></td>
              <td>${s.name || ''}</td>
              <td>$${s.price?.toFixed(2) || '—'}</td>
              <td>${s.market_cap_str || '—'}</td>
              <td>${s.pe_ratio || '—'}</td>
              <td>${s.forward_pe || '—'}</td>
              <td class="${perfClass(s.performance?.['1d'])}">${fmt(s.performance?.['1d'])}</td>
              <td class="${perfClass(s.performance?.['1w'])}">${fmt(s.performance?.['1w'])}</td>
              <td class="${perfClass(s.performance?.['1m'])}">${fmt(s.performance?.['1m'])}</td>
              <td class="${perfClass(s.performance?.ytd)}">${fmt(s.performance?.ytd)}</td>
              <td class="${perfClass(s.performance?.['1y'])}">${fmt(s.performance?.['1y'])}</td>
              <td><canvas class="sparkline" data-ticker="${s.ticker}" style="width:80px;height:30px"></canvas></td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;

  // Private companies if any
  if (seg.private_companies?.length) {
    html += `
      <div class="card">
        <h3>Private Companies</h3>
        <p style="color: var(--text-dim); font-size: 13px;">
          ${seg.private_companies.join(', ')} — Not publicly traded. Track via thought leaders and news.
        </p>
      </div>
    `;
  }

  // News
  const news = DATA.segment_news?.[segId];
  html += `<div class="card"><h2>Segment News</h2>${renderNews(news)}</div>`;

  // Company news

    return `<div class="card"><h3>${t} News</h3>${renderNews(cn)}</div>`;
  }).join('');

  panel.innerHTML = html;

                <td><strong>${t}</strong> <span style="color: var(--text-dim); font-size: 11px;">${s.name || ''}</span></td>
                <td>${capexAmt ? '$' + capexAmt + 'B' : '—'}</td>
                <td>${rev ? '$' + (rev / 1e9).toFixed(0) + 'B' : '—'}</td>
                <td style="font-weight: 600; color: ${capexRevPct > 50 ? 'var(--red)' : capexRevPct > 30 ? 'var(--yellow)' : 'var(--green)'};">
                  ${capexRevPct ? capexRevPct + '%' : '—'}
                </td>
                <td class="${perfClass(s.revenue_growth)}" style="font-weight: 600;">${s.revenue_growth != null ? fmt(s.revenue_growth) : '—'}</td>
                <td>${fcf ? (fcf > 0 ? '+' : '') + '$' + (fcf / 1e9).toFixed(1) + 'B' : '—'}</td>
                <td style="color: ${fcfYield > 3 ? 'var(--green)' : 'var(--text-dim)'};">${fcfYield ? fcfYield + '%' : '—'}</td>
                <td class="${netCash > 0 ? 'positive' : 'negative'}">${'$' + (netCash / 1e9).toFixed(0) + 'B'}</td>
              </tr>
            `;
          }).join('')}
        </tbody>
      </table>
    </div>
  `;

  // ── 4. BOTTLENECK ANALYSIS ──
  html += `
    <div class="card">
      <h2>Bottleneck Analysis — Where Demand Exceeds Supply</h2>
      <div class="grid-2">
        <div style="padding: 16px; background: var(--surface2); border-radius: 10px;">
          <h3 style="color: var(--red); margin-bottom: 8px;">Power — Critical Constraint</h3>
          <div style="font-size: 13px; margin-bottom: 8px;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 4px;"><span>Current DC power (US)</span><strong>183 TWh</strong></div>
            <div style="display: flex; justify-content: space-between; margin-bottom: 4px;"><span>2030 projected</span><strong>426 TWh (+133%)</strong></div>
            <div style="display: flex; justify-content: space-between;"><span>AI-specific demand by 2035</span><strong>123 GW (Deloitte)</strong></div>
          </div>
          <div style="background: var(--bg); border-radius: 6px; height: 20px; overflow: hidden; margin: 10px 0;">
            <div style="width: 43%; height: 100%; background: linear-gradient(90deg, var(--red), var(--yellow));" title="43% of 2030 capacity committed"></div>
          </div>
          <div style="font-size: 11px; color: var(--text-dim);">~43% of 2030 projected demand already committed via PPAs. Nuclear restarts take 3-5 years. SMRs not online until 2030+.</div>
          <div style="margin-top: 10px; font-size: 12px;"><strong>Beneficiaries:</strong> <span style="color: var(--green);">CEG, TLN, VST, NRG, OKLO, SMR</span></div>
        </div>

        <div style="padding: 16px; background: var(--surface2); border-radius: 10px;">
          <h3 style="color: var(--yellow); margin-bottom: 8px;">GPU Supply — Easing but Still Tight</h3>
          <div style="font-size: 13px; margin-bottom: 8px;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 4px;"><span>NVIDIA DC rev (Q4 FY25)</span><strong>$35.6B/quarter</strong></div>
            <div style="display: flex; justify-content: space-between; margin-bottom: 4px;"><span>Blackwell first quarter</span><strong>$11B (fastest ramp ever)</strong></div>
            <div style="display: flex; justify-content: space-between;"><span>Custom silicon share</span><strong>~20% and rising</strong></div>
          </div>
          <div style="background: var(--bg); border-radius: 6px; height: 20px; overflow: hidden; margin: 10px 0;">
            <div style="width: 75%; height: 100%; background: linear-gradient(90deg, #76b900, #76b900aa);" title="NVIDIA 75% share"></div>
          </div>
          <div style="font-size: 11px; color: var(--text-dim);">Blackwell ramping fast but hyperscalers building custom silicon (TPU, Trainium, MTIA). Share erosion gradual but real.</div>
          <div style="margin-top: 10px; font-size: 12px;"><strong>Watch:</strong> <span style="color: var(--yellow);">NVDA share vs AVGO/MRVL (custom ASIC designers)</span></div>
        </div>

        <div style="padding: 16px; background: var(--surface2); border-radius: 10px;">
          <h3 style="color: var(--green); margin-bottom: 8px;">Networking — Scaling Bottleneck</h3>
          <div style="font-size: 13px; margin-bottom: 8px;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 4px;"><span>Share of capex</span><strong>~10%</strong></div>
            <div style="display: flex; justify-content: space-between; margin-bottom: 4px;"><span>GPU cluster size</span><strong>10K-100K+ GPUs</strong></div>
            <div style="display: flex; justify-content: space-between;"><span>Interconnect requirement</span><strong>Scaling faster than compute</strong></div>
          </div>
          <div style="font-size: 11px; color: var(--text-dim); margin-top: 8px;">Every doubling of cluster size requires more than doubling of networking. InfiniBand/Ethernet switches, fiber, and optical transceivers are quiet bottlenecks.</div>
          <div style="margin-top: 10px; font-size: 12px;"><strong>Beneficiaries:</strong> <span style="color: var(--green);">ANET, CSCO, AVGO (networking ASICs)</span></div>
        </div>

        <div style="padding: 16px; background: var(--surface2); border-radius: 10px;">
          <h3 style="color: var(--accent); margin-bottom: 8px;">Cooling — Emerging Constraint</h3>
          <div style="font-size: 13px; margin-bottom: 8px;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 4px;"><span>Rack density (2022)</span><strong>8 kW/rack</strong></div>
            <div style="display: flex; justify-content: space-between; margin-bottom: 4px;"><span>Rack density (2024)</span><strong>17 kW/rack</strong></div>
            <div style="display: flex; justify-content: space-between;"><span>Training clusters</span><strong>80+ kW/rack</strong></div>
          </div>
          <div style="font-size: 11px; color: var(--text-dim); margin-top: 8px;">10x density increase requires liquid cooling (direct-to-chip). Air cooling physically cannot handle GPU training racks. Only ~4% of capex but mission-critical.</div>
          <div style="margin-top: 10px; font-size: 12px;"><strong>Beneficiaries:</strong> <span style="color: var(--green);">VRT (Vertiv — cooling + power management)</span></div>
        </div>
      </div>
    </div>
  `;

  // ── 5. COMPOSITE SCORING ──
  // Score each stock on multiple dimensions
  const scored = allStocks.map(s => {
    let score = 0;
    let factors = [];

    // Revenue growth (max 25 pts)
    if (s.revenue_growth != null) {
      const rgScore = Math.min(s.revenue_growth / 2, 25);
      score += rgScore;
      if (s.revenue_growth > 20) factors.push({ text: 'Strong revenue growth (' + s.revenue_growth + '%)', positive: true });
      if (s.revenue_growth < 5) factors.push({ text: 'Weak revenue growth (' + s.revenue_growth + '%)', positive: false });
    }

    // Valuation — PEG ratio (max 20 pts, lower is better)
    if (s.peg_ratio != null && s.peg_ratio > 0) {
      const pegScore = s.peg_ratio < 1 ? 20 : s.peg_ratio < 2 ? 12 : s.peg_ratio < 3 ? 5 : 0;
      score += pegScore;
      if (s.peg_ratio < 1) factors.push({ text: 'PEG < 1 (undervalued vs growth)', positive: true });
      if (s.peg_ratio > 3) factors.push({ text: 'PEG > 3 (expensive vs growth)', positive: false });
    }

    // Analyst upside (max 15 pts)
    if (s.analyst_upside != null) {
      const auScore = Math.min(Math.max(s.analyst_upside / 2, -10), 15);
      score += auScore;
      if (s.analyst_upside > 20) factors.push({ text: 'Analyst upside ' + s.analyst_upside + '%', positive: true });
      if (s.analyst_upside < -10) factors.push({ text: 'Below analyst targets', positive: false });
    }

    // Margin quality (max 15 pts)
    if (s.gross_margin != null) {
      const gmScore = s.gross_margin > 70 ? 15 : s.gross_margin > 50 ? 10 : s.gross_margin > 30 ? 5 : 0;
      score += gmScore;
      if (s.gross_margin > 70) factors.push({ text: 'High gross margin (' + s.gross_margin + '%)', positive: true });
    }

    // 52-week position — contrarian signal (max 10 pts)
    if (s.w52_position != null) {
      // Reward being in the middle or lower part of range (room to run), penalize being at highs
      const w52Score = s.w52_position < 30 ? 10 : s.w52_position < 50 ? 7 : s.w52_position < 70 ? 4 : 0;
      score += w52Score;
      if (s.w52_position < 30) factors.push({ text: 'Near 52-week low (' + s.w52_position + '%)', positive: true });
      if (s.w52_position > 90) factors.push({ text: 'Near 52-week high', positive: false });
    }

    // Momentum — YTD performance (max 15 pts, reward positive but not extreme)
    if (s.performance?.ytd != null) {
      const ytd = s.performance.ytd;
      const momScore = ytd > 0 && ytd < 30 ? 15 : ytd > 30 ? 8 : ytd > -10 ? 5 : 0;
      score += momScore;
    }

    return { ...s, score: Math.round(score), factors };
  });

  scored.sort((a, b) => b.score - a.score);

  html += `
    <div class="card">
      <h2>Composite Opportunity Score</h2>
      <p style="color: var(--text-dim); font-size: 13px; margin-bottom: 4px;">
        Multi-factor ranking: Revenue Growth (25%), PEG Valuation (20%), Analyst Upside (15%), Margin Quality (15%), 52-Week Position (10%), Momentum (15%).
      </p>
      <p style="color: var(--text-dim); font-size: 11px; margin-bottom: 16px;">
        Higher score = more factors align. Not a recommendation — a framework for identifying where to dig deeper.
      </p>
      <table>
        <thead>
          <tr><th>#</th><th>Ticker</th><th>Segment</th><th>Score</th><th>Price</th><th>YTD</th><th>Rev Growth</th><th>PEG</th><th>Analyst Upside</th><th>Key Factors</th></tr>
        </thead>
        <tbody>
          ${scored.slice(0, 20).map((s, i) => `
            <tr>
              <td style="color: ${i < 3 ? 'var(--green)' : i < 10 ? 'var(--text)' : 'var(--text-dim)'}; font-weight: 700;">${i + 1}</td>
              <td><strong>${s.ticker}</strong></td>
              <td><span class="segment-badge" style="background: ${s.segColor}22; color: ${s.segColor}">${s.segment}</span></td>
              <td>
                <div style="display: flex; align-items: center; gap: 6px;">
                  <div style="width: 60px; height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden;">
                    <div style="height: 100%; width: ${Math.min(s.score, 100)}%; background: ${s.score > 60 ? 'var(--green)' : s.score > 40 ? 'var(--yellow)' : 'var(--red)'}; border-radius: 4px;"></div>
                  </div>
                  <span style="font-weight: 700; font-size: 14px;">${s.score}</span>
                </div>
              </td>
              <td>$${s.price?.toFixed(2) || '—'}</td>
              <td class="${perfClass(s.performance?.ytd)}">${fmt(s.performance?.ytd)}</td>
              <td class="${perfClass(s.revenue_growth)}">${s.revenue_growth != null ? fmt(s.revenue_growth) : '—'}</td>
              <td style="color: ${s.peg_ratio && s.peg_ratio < 1 ? 'var(--green)' : 'var(--text)'};">${s.peg_ratio || '—'}</td>
              <td class="${perfClass(s.analyst_upside)}">${s.analyst_upside != null ? fmt(s.analyst_upside) : '—'}</td>
              <td style="font-size: 11px; color: var(--text-dim);">
                ${s.factors.slice(0, 3).map(f => `<span style="color: ${f.positive ? 'var(--green)' : 'var(--red)'};">${f.text}</span>`).join('<br>')}
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;

  // ── 6. RISK FACTORS ──
  html += `
    <div class="card">
      <h2>Key Risk Scenarios</h2>
      <div class="grid-2">
        <div style="padding: 14px; border-left: 3px solid var(--red); background: var(--surface2); border-radius: 0 8px 8px 0;">
          <h3 style="color: var(--red); margin-bottom: 6px;">Capex Doesn't Convert to Revenue</h3>
          <div style="font-size: 13px; color: var(--text-dim);">
            $405B in 2025 capex needs to generate downstream AI revenue. If enterprise adoption stalls, hyperscaler earnings compress and downstream software never accelerates.
            <br><strong>Who gets hurt:</strong> MSFT, GOOG, AMZN (margin compression), then CRM, NOW, DDOG (no demand wave).
            <br><strong>Who's protected:</strong> NVDA (already sold the GPUs), TLN, CEG (locked PPAs).
          </div>
        </div>
        <div style="padding: 14px; border-left: 3px solid var(--red); background: var(--surface2); border-radius: 0 8px 8px 0;">
          <h3 style="color: var(--red); margin-bottom: 6px;">Custom Silicon Accelerates</h3>
          <div style="font-size: 13px; color: var(--text-dim);">
            Google TPUs, Amazon Trainium, Meta MTIA collectively displace NVIDIA faster than expected. Already 50%+ of inference at hyperscalers.
            <br><strong>Who gets hurt:</strong> NVDA (share erosion), AMD (smaller player squeezed).
            <br><strong>Who benefits:</strong> AVGO, MRVL (design the custom ASICs), TSM (fabs them all).
          </div>
        </div>
        <div style="padding: 14px; border-left: 3px solid var(--yellow); background: var(--surface2); border-radius: 0 8px 8px 0;">
          <h3 style="color: var(--yellow); margin-bottom: 6px;">Power Constraints Delay Buildout</h3>
          <div style="font-size: 13px; color: var(--text-dim);">
            Nuclear restarts take 3-5 years. SMRs unproven at scale. Grid capacity can't keep up with 7 GW of Stargate + hyperscaler expansion.
            <br><strong>Who gets hurt:</strong> Everyone downstream (can't deploy GPUs without power).
            <br><strong>Who benefits:</strong> Power incumbents with existing capacity (CEG, VST, NRG). VRT (efficiency).
          </div>
        </div>
        <div style="padding: 14px; border-left: 3px solid var(--yellow); background: var(--surface2); border-radius: 0 8px 8px 0;">
          <h3 style="color: var(--yellow); margin-bottom: 6px;">Regulation / Geopolitical Risk</h3>
          <div style="font-size: 13px; color: var(--text-dim);">
            Export controls tighten (NVDA China revenue at risk), AI regulation adds compliance costs, Taiwan risk affects TSM/ASML.
            <br><strong>Who gets hurt:</strong> NVDA (China ~15% of rev), TSM, ASML (fab concentration).
            <br><strong>Who's protected:</strong> Domestic infra plays (VRT, ANET, CEG), software (CRM, NOW).
          </div>
        </div>
      </div>
    </div>
  `;

  panel.innerHTML = html;
}

function renderW52Bar(position) {
  return `
    <div style="display: flex; align-items: center; gap: 4px; min-width: 80px;">
      <div style="flex: 1; height: 6px; background: var(--surface2); border-radius: 3px; position: relative; min-width: 60px;">
        <div style="position: absolute; left: ${position}%; top: -3px; width: 4px; height: 12px; background: ${position > 80 ? 'var(--red)' : position < 30 ? 'var(--green)' : 'var(--accent)'}; border-radius: 2px; transform: translateX(-50%);"></div>
      </div>
      <span style="font-size: 11px; color: var(--text-dim); width: 30px; text-align: right;">${position}%</span>
    </div>
  `;
}

// ============================================================
// Init
// ============================================================
document.addEventListener('DOMContentLoaded', loadData);
</script>
</body>
</html>
